<!DOCTYPE html>

<html>

<head>

<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

rel="stylesheet">

<link rel="stylesheet"

href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="text-success">

Prediction Result

</h2>

<hr>

<div class="row">

<div class="col-md-6">

<h4>

Prediction

</h4>

<h2>

{{ prediction }}

</h2>

<h4>

Confidence

</h4>

<h2>

{{ confidence }} %

</h2>

<h4>

Risk Level

</h4>

<h2>

{{ risk }}

</h2>

</div>

<div class="col-md-6">

<h4>

Uploaded Image

</h4>

<img

src="{{ url_for('static',

filename='uploads/' + image) }}"

class="img-fluid">

<br><br>

<h4>

GradCAM

</h4>

<img

src="{{ url_for('static',

filename='heatmaps/' + heatmap) }}"

class="img-fluid">

</div>

</div>

<hr>

<a

href="/"

class="btn btn-primary">

Predict Another Image

</a>

</div>

</div>

</body>

</html>
